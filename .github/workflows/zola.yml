name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        # Fetch full history for proper git info in the site
        fetch-depth: 0
    
    - name: Cache Zola binaries
      uses: actions/cache@v4
      with:
        path: ~/.local/share/zola
        key: zola-0.22.1
    
    - name: Build and deploy to gh-pages
      uses: shalzz/zola-deploy-action@v0.18.0
      env:
        # Token for pushing to gh-pages branch
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Output branch - keeps source and build artifacts separate
        OUT_DIR: public
        BUILD_FLAGS: --output-dir public
